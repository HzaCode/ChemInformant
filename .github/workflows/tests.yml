name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for deploying badge to gh-pages
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,plot]" pytest-cov coverage-badge mypy types-requests

      - name: Verify plotting libraries
        run: |
          python - <<'PY'
          import sys, matplotlib
          from PIL import __version__ as PILVER
          print("Python", sys.version.split()[0])
          print("Pillow", PILVER)
          print("matplotlib", matplotlib.__version__)
          PY

      - name: Run linting with ruff
        if: matrix.python-version == '3.11'
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Run type checking with mypy
        if: matrix.python-version == '3.11'
        run: mypy src/ChemInformant --ignore-missing-imports --allow-untyped-defs --allow-incomplete-defs --no-strict-optional

      - name: Run unit tests with coverage (integration tests excluded)
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: pytest --cov=src/ChemInformant --cov-report=xml -v -m "not integration" tests/

      - name: Generate coverage badge
        if: matrix.python-version == '3.11'
        run: coverage-badge -o coverage.svg -f

      - name: Deploy badge to gh-pages
        if: matrix.python-version == '3.11'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
          allow_empty_commit: false
          commit_message: "Update coverage badge [skip ci]"

  integration:
    # Live PubChem tests run separately from the main matrix so a PubChem
    # hiccup doesn't red a PR. They still run on push/PR so regressions
    # in live behavior are caught, but they are manually re-runnable and
    # their failure is informational until marked required.
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    permissions:
      contents: read  # Integration tests only need read access
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,plot]"

      - name: Run integration tests against live PubChem
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: pytest -v -m integration tests/
